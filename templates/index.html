function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function slots(){var el=document.getElementById('lib');var h='';
 LIB.forEach(function(g){
   h+='<div class="group-h"><span class="gi" style="background:'+g.accent+'"><i class="ti '+g.ico+'"></i></span>'+g.group+'</div>';
   if(g.phases){
     var last=null;
     g.items.forEach(function(it){
       if(it.ph!==last){ if(last!==null)h+='</div>'; h+='<div class="ph-row"><span class="ph-badge">'+it.ph+'</span><span class="ph-name">'+it.phl+'</span><span class="ph-line"></span></div><div class="grid">'; last=it.ph; }
       h+=card(it,g.cls);
     });
     if(last!==null)h+='</div>';
   } else {
     h+='<div class="grid">'+g.items.map(function(it){return card(it,g.cls);}).join('')+'</div>';
   }
 });
 el.innerHTML=h;
}
function card(it,cls){
  var t=it.key?TMPL_DATA[it.key]:null;
  var title=it.title||(t?t.title:'');
  var role=it.role?'<span class="role-tag '+it.role+'">'+it.role+'</span>':'';
  var acts='';
  if(it.key){
    var single=t&&t.tabs.length===1;
    acts+='<button class="btn btn-view" onclick="openModal(\''+it.key+'\')"><i class="ti ti-eye"></i> 見る</button>';
    if(single)acts+='<button class="btn btn-copy" onclick="copyKey(\''+it.key+'\',0,this)"><i class="ti ti-copy"></i> コピー</button>';
  }
  if(it.links){it.links.forEach(function(l){acts+='<a class="btn btn-link" href="'+l.url+'" target="_blank" rel="noopener"><i class="ti '+l.ico+'"></i> '+l.label+'</a>';});}
  if(it.slot){ var u=DOC_LINKS[it.slot]; if(u)acts+='<a class="btn btn-link" href="'+u+'" target="_blank" rel="noopener"><i class="ti ti-external-link"></i> 開く</a>'; else acts+='<span class="btn disabled"><i class="ti ti-external-link"></i> リンク設定待ち</span>'; }
  return '<div class="tcard '+cls+'"><div class="tc-top">'+role+'</div><h3>'+title+'</h3><p>'+(it.desc||'')+'</p><div class="tc-act">'+acts+'</div></div>';
}

var _id=null,_tab=0;
function openModal(id){var d=TMPL_DATA[id];if(!d)return;_id=id;_tab=0;
  document.getElementById('m-title').textContent=d.title;
  document.getElementById('m-tabs').innerHTML=d.tabs.map(function(t,i){return '<button class="m-tab'+(i===0?' active':'')+'" onclick="switchTab('+i+')">'+t.label+'</button>';}).join('');
  document.getElementById('m-tabs').style.display=d.tabs.length>1?'flex':'none';
  render(d.tabs[0].content);
  document.getElementById('ov').classList.add('show');
  resetCopy();
}
function switchTab(i){var d=TMPL_DATA[_id];_tab=i;render(d.tabs[i].content);
  document.querySelectorAll('.m-tab').forEach(function(t,j){t.classList.toggle('active',j===i);});resetCopy();}
function render(text){var el=document.getElementById('m-text');var re=/(https?:\/\/[^\s]+)/g;
  el.innerHTML=esc(text).replace(/\{\{(.+?)\}\}/g,'<b>{{$1}}</b>').replace(re,function(u){return '<a href="'+u+'" target="_blank" rel="noopener">'+u+'</a>';});}
function closeModal(){document.getElementById('ov').classList.remove('show');}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
function resetCopy(){var b=document.getElementById('m-copy');b.classList.remove('copied');b.innerHTML='<i class="ti ti-copy"></i> コピー';}
function doCopy(text){if(navigator.clipboard&&navigator.clipboard.writeText)return navigator.clipboard.writeText(text);return new Promise(function(res){var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);res();});}
function toast(){var el=document.getElementById('toast');el.classList.add('show');setTimeout(function(){el.classList.remove('show');},1600);}
function copyModal(){var d=TMPL_DATA[_id];doCopy(d.tabs[_tab].content).then(function(){toast();var b=document.getElementById('m-copy');b.classList.add('copied');b.innerHTML='<i class="ti ti-check"></i> コピー完了';});}
function copyKey(id,i,btn){var d=TMPL_DATA[id];doCopy(d.tabs[i].content).then(function(){toast();var o=btn.innerHTML;btn.innerHTML='<i class="ti ti-check"></i> コピー済み';setTimeout(function(){btn.innerHTML=o;},1400);});}

slots();
</script>
